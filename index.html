<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Index</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23FFFF00'/></svg>">  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="container header-inner">
      <div class="title-group">
        <h1>
          Index
        </h1>
      </div>
      <div class="count-badge" id="projectCount">0 Index(es)</div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container">
    
    <div class="controls">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Cerca tool (premi '/')..." autocomplete="off" />
      </div>

      <div class="filters">
        <select id="sortSelect">
          <option value="added_desc">Più recenti</option>
          <option value="alpha">Alfabetico (A-Z)</option>
          <option value="alpha_desc">Alfabetico (Z-A)</option>
        </select>
        <div class="divider"></div>
        <div class="view-toggles">
          <button class="btn-icon active" id="btnGrid" title="Vista a griglia">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          </button>
          <button class="btn-icon" id="btnList" title="Vista a lista">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="tags-wrap" id="tagsContainer"></div>
    <div class="projects-container" id="gridContainer"></div>

  </main>
</body>
</html>
